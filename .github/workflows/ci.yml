name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URI: postgresql+psycopg://postgres:postgres@localhost:5432/testdb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # Pip-only cache looks for requirements.txt/pyproject.toml; this repo uses Pipenv.
          cache: pipenv

      - name: Install Pipenv
        run: python -m pip install --upgrade pip pipenv

      - name: Install dependencies
        run: pipenv install --dev --deploy

      - name: Lint and run unit tests
        run: |
          pipenv run flake8 service tests --count --select=E9,F63,F7,F82 --show-source --statistics
          pipenv run flake8 service tests --count --max-complexity=10 --max-line-length=127 --statistics
          pipenv run pylint service tests --max-line-length=127
          pipenv run pytest --cov-report=xml
      - name: Run unit tests
        run: pipenv run pytest --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
