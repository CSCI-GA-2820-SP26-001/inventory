apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: lint
spec:
  workspaces:
    - name: source
  steps:
    - name: lint
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -e
        pip install --upgrade pip pipenv
        pipenv install --dev --deploy
        pipenv run flake8 service tests
        pipenv run pylint service tests --max-line-length=127
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: test
spec:
  workspaces:
    - name: source
  steps:
    - name: test
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -e
        pip install --upgrade pip pipenv
        pipenv install --dev --deploy
        DATABASE_URI=sqlite:///test.db pipenv run pytest -q -o addopts=''
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-image
spec:
  params:
    - name: IMAGE
      type: string
    - name: CONTEXT
      type: string
      default: .
    - name: DOCKERFILE
      type: string
      default: ./Dockerfile
  workspaces:
    - name: source
  results:
    - name: IMAGE_URL
      description: Built image reference
  steps:
    - name: write-auth
      image: registry.access.redhat.com/ubi9/ubi-minimal:9.4
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -eu
        REGISTRY="image-registry.openshift-image-registry.svc:5000"
        AUTH_DIR="/tekton/home/.docker"
        mkdir -p "${AUTH_DIR}"
        AUTH_B64="$(printf 'pipeline:%s' "$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" | base64 | tr -d '\n')"
        cat > "${AUTH_DIR}/config.json" <<EOF
        {"auths":{"${REGISTRY}":{"auth":"${AUTH_B64}"}}}
        EOF
    - name: build-and-push
      image: gcr.io/kaniko-project/executor:v1.23.2-debug
      env:
        - name: DOCKER_CONFIG
          value: /tekton/home/.docker
      command:
        - /kaniko/executor
      args:
        - --context=$(workspaces.source.path)/$(params.CONTEXT)
        - --dockerfile=$(workspaces.source.path)/$(params.DOCKERFILE)
        - --destination=$(params.IMAGE)
        - --insecure
        - --skip-tls-verify
    - name: write-result
      image: registry.access.redhat.com/ubi9/ubi-minimal:9.4
      script: |
        #!/usr/bin/env bash
        printf "%s" "$(params.IMAGE)" > "$(results.IMAGE_URL.path)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy
spec:
  params:
    - name: IMAGE
      type: string
    - name: DEPLOYMENT_NAME
      type: string
      default: inventory
    - name: CONTAINER_NAME
      type: string
      default: inventory
  workspaces:
    - name: source
  steps:
    - name: deploy
      image: quay.io/openshift/origin-cli:4.15
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env sh
        set -eu
        kubectl apply -R -f k8s/
        kubectl set image "deployment/$(params.DEPLOYMENT_NAME)" "$(params.CONTAINER_NAME)=$(params.IMAGE)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: bdd-test
spec:
  params:
    - name: BASE_URL
      type: string
  workspaces:
    - name: source
  steps:
    - name: bdd
      image: python:3.12-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -e
        pip install --upgrade pip pipenv
        pipenv install --dev --deploy
        BASE_URL="$(params.BASE_URL)" DATABASE_URI=sqlite:///test.db pipenv run behave features/ui_smoke.feature
